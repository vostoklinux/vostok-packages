---
# Locale configuration for Vostok Linux

# Default region and zone
region: Europe
zone: Moscow

# Path to locale.gen
localeGenPath: /etc/locale.gen

# Available locales
locales:
  - en_US.UTF-8
  - ru_RU.UTF-8

# GeoIP settings
geoip:
  style: "json"
  url: "https://geoip.kde.org/v1/calamares"
  selector: "time_zone"
  
# Language models
language:
  models:
    - "default.conf"
    
# Keyboard settings
keyboard:
  model: "pc105"
  layout: "us,ru"
  variant: ","
  options: "grp:alt_shift_toggle"

---
# Vostok Linux Calamares Configuration
# https://github.com/vostoklinux

# General settings
modules-search: [ local ]

# Sequence of Calamares modules
sequence:
  - show:
    - welcome
  - show:
    - partition
    - mount
  - show:
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - luksopenswaphookcfg
    - luksbootkeyfile
    - users
    - displaymanager
    - networkcfg
    - hwclock
    - services-systemd
    - packages
    - grubcfg
    - bootloader
    - umount
  - show:
    - finished

# Branding
branding: vostok

# Prompt before installation
prompt-install: true

# Do not run in chroot (for live systems)
dont-chroot: false

# UI settings
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: true
quit-at-end: false

# System requirements
required-storage: 5G
required-ram: 1G

# Kernel
kernel: linux6.6

# Packages to install
packages:
  - base-system
  - base-devel
  - linux6.6
  - xbps
  - curl
  - wget
  - git
  - sudo
  - doas
  - vostok-mirrorlist
  - vostok-release
  - vostok-wallpapers

# Display manager (KDE Plasma)
displaymanager: sddm

# Network configuration
netinstall: false

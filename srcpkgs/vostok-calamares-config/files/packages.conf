---
# Packages configuration for Vostok Linux

# Package manager backend (xbps for Void Linux)
backend: xbps

# Update package database before installation
updateDb: true

# Package operations
operations:
  - install:
    - base-system
    - base-devel
    - linux6.6
    - xbps
    - curl
    - wget
    - git
    - sudo
    - doas
    - vostok-mirrorlist
    - vostok-release
    - vostok-wallpapers
    - kde5
    - sddm
    - firefox
    - konsole
    - dolphin

# Skip packages (if any)
skip:
  - libreoffice
  - thunderbird

# Package repositories
repositories:
  - https://repo.vostoklinux.org/current
  - https://repo-default.voidlinux.org/current

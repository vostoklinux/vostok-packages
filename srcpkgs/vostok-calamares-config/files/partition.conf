---
# Partitioning configuration for Vostok Linux

# Default filesystem
defaultFileSystemType: "ext4"

# EFI system partition
efiSystemPartition: "/boot/efi"
efiSystemPartitionSize: 512M
efiSystemPartitionName: "efi"

# User swap choices
userSwapChoices:
  - none
  - small
  - suspend
  - file

# Draw nested partitions (for LVM, etc.)
drawNestedPartitions: false

# Always show partition labels
alwaysShowPartitionLabels: true

# Initial partitioning choice
initialPartitioningChoice: none

# Initial swap choice
initialSwapChoice: small

# Default partition table type
defaultPartitionTableType: gpt

# Available filesystem types
availableFileSystemTypes: ["ext4", "btrfs", "xfs", "f2fs"]

# Required partitions
requiredPartitions:
  - mountPoint: "/"
    filesystem: "ext4"
    size: 10G
  - mountPoint: "/boot/efi"
    filesystem: "fat32"
    size: 512M
    flags: [ boot ]

# Allow manual partitioning
allowManualPartitioning: true

# Show not-encryptable partitions
showNotEncryptableMessage: true

# LUKS settings
luksGeneration: aes-xts-plain64
luksKeySize: 512
luksMinKeySize: 512

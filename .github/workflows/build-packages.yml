    - name: Setup Void Linux Build Environment
      run: |
        echo "=== Setting up Void Linux build environment on Ubuntu ==="
        
        # Install build dependencies
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          bash \
          curl \
          git \
          perl \
          tar \
          xz-utils \
          zstd \
          zip \
          python3 \
          gcc \
          make \
          patch \
          libarchive-tools \
          liblz4-tool \
          zlib1g-dev \
          libssl-dev \
          pkg-config \
          bubblewrap \
          bsdtar  # Добавляем bsdtar для работы с xbps архивами
        
        # Clone void-packages repository
        git clone --depth=1 https://github.com/void-linux/void-packages.git
        cd void-packages
        
        # КРИТИЧЕСКОЕ ИСПРАВЛЕНИЕ: Правильная инициализация
        echo "Initializing xbps-src..."
        
        # 1. Сначала создаем базовую конфигурацию
        echo "XBPS_CHROOT_CMD=ethereal" > etc/conf
        echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> etc/conf
        
        # 2. Проверяем наличие mksunmus
        echo "Checking for mksunmus..."
        if [ -f "./mksunmus" ]; then
          echo "Found mksunmus, trying to run it..."
          chmod +x ./mksunmus
          if ./mksunmus; then
            echo "mksunmus executed successfully"
          else
            echo "mksunmus failed, trying alternative approach..."
          fi
        else
          echo "mksunmus not found, using standard bootstrap"
        fi
        
        # 3. Альтернативный метод: Скачиваем статический xbps напрямую
        echo "Downloading static xbps tools..."
        mkdir -p /tmp/xbps-static
        cd /tmp/xbps-static
        
        # Скачиваем статический xbps
        curl -LO https://repo-default.voidlinux.org/static/xbps-static-latest.x86_64-musl.tar.xz
        tar -xf xbps-static-latest.x86_64-musl.tar.xz
        
        # Копируем статические бинарники в доступное место
        cp xbps-static-*/xbps-static /usr/local/bin/
        chmod +x /usr/local/bin/xbps-static
        
        # Проверяем
        if command -v xbps-static &> /dev/null; then
          echo "✅ xbps-static installed successfully"
          xbps-static --version
        else
          echo "❌ Failed to install xbps-static"
          exit 1
        fi
        
        # Возвращаемся в void-packages
        cd -
        
        # 4. Запускаем binary-bootstrap с явным указанием использовать ethereal
        echo "Running binary-bootstrap..."
        if ./xbps-src -E etc/conf binary-bootstrap; then
          echo "✅ binary-bootstrap completed successfully"
        else
          echo "❌ binary-bootstrap failed, trying alternative method..."
          
          # Альтернативный метод: используем статический xbps для создания chroot
          echo "Creating minimal chroot with static xbps..."
          
          # Создаем базовый chroot
          mkdir -p /tmp/void-chroot
          
          # Используем статический xbps для установки базовых пакетов
          XBPS_ARCH=x86_64 xbps-static -r /tmp/void-chroot -R https://repo-default.voidlinux.org/current \
            base-chroot xbps
          
          # Создаем символические ссылки
          ln -sf /tmp/void-chroot/usr/bin/xbps-* /usr/local/bin/ || true
          
          echo "Alternative chroot setup complete"
        fi
        
        echo "✅ Build environment ready!"
      if: always()
      run: |
        echo "=== Build Summary ==="
        echo "Package: ${{ matrix.package }}"
        echo "Build status: ${{ job.status }}"
        echo "Repository: https://repo.vostoklinux.org/current/"
        echo "Main website: https://vostoklinux.org"
        echo "Timestamp: $(date)"
name: Build and Deploy Vostok Packages

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'srcpkgs/**'
      - '.github/workflows/build-deploy.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Ручной запуск
  schedule:
    - cron: '0 2 * * 0'  # Еженедельно в воскресенье в 2 часа ночи

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # Хостовая система для запуска Docker
    container:             # Запускаем в контейнере Void Linux
      image: voidlinux/voidlinux:latest
      options: --user root --privileged # Нужны привилегии для bubblewrap/chroot
    
    strategy:
      matrix:
        package:
          - vostok-mirrorlist
          - vostok-release
          - vostok-wallpapers
          - vostok-calamares-config
          - vostok-grub-theme
    
    steps:
    - name: Checkout Vostok Packages Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        
    - name: Setup Void Linux Build Environment
      run: |
        echo "=== Setting up Void Linux build environment ==="
        
        # 1. Обновляем систему и устанавливаем зависимости ВНУТРИ Void Linux
        echo "Updating system and installing dependencies..."
        xbps-install -Syu
        xbps-install -y base-devel curl git xtools bubblewrap openssl libarchive liblz4
        
        # 2. Подготовка к сборке: xtools установил xbps-src в PATH
        echo "✅ xbps-src ready to use."
        
    - name: Build Package ${{ matrix.package }}
      # В этом шаге мы находимся в корне репозитория (благодаря checkout@v3)
      run: |
        echo "=== Building package: ${{ matrix.package }} ==="
        
        # Копируем наш пакет в правильное место для сборки
        mkdir -p void-packages/srcpkgs/
        cp -r "srcpkgs/${{ matrix.package }}" "void-packages/srcpkgs/"
          
        # Переходим в директорию void-packages
        cd void-packages
        
        # Настраиваем локальную конфигурацию
        echo "XBPS_CHROOT_CMD=bubblewrap" > etc/conf
        echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> etc/conf
        
        # Сначала бутстрапим среду
        ./xbps-src binary-bootstrap
        
        # Собираем пакет
        echo "Building ${{ matrix.package }}..."
        if ./xbps-src pkg "${{ matrix.package }}"; then
          echo "✅ Package ${{ matrix.package }} built successfully!"
          
          # Копируем артефакты в /tmp/artifacts для следующего шага
          mkdir -p /tmp/artifacts
          find hostdir/binpkgs -name "*${{ matrix.package }}*.xbps" -exec cp {} /tmp/artifacts/ \;
        else
          echo "❌ Failed to build ${{ matrix.package }}"
          exit 1
        fi
        
    - name: Deploy to VPS
      if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      env:
        VPS_HOST: ${{ secrets.VPS_HOST }}
        VPS_USER: ${{ secrets.VPS_USER }}
        SSH_PRIVATE_KEY_CONTENT: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        echo "=== Deploying packages to VPS ==="
        
        # Setup SSH securely (используем правильный cat EOF синтаксис)
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        cat <<EOF > ~/.ssh/id_ed25519
        ${SSH_PRIVATE_KEY_CONTENT}
        EOF
        chmod 600 ~/.ssh/id_ed25519
        
        # Add host to known_hosts (необходимо для ssh/scp)
        ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null
        
        # Используем scp безопасно
        if ls /tmp/artifacts/*.xbps 2>/dev/null; then
          echo "Uploading packages to VPS..."
          scp -o StrictHostKeyChecking=no /tmp/artifacts/*.xbps $VPS_USER@$VPS_HOST:/tmp/
          
          echo "Updating repository on VPS..."
          ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "
            set -e
            echo 'Moving packages...'
            sudo mv -f /tmp/*.xbps /var/www/vostoklinux.org/repo/current/
            
            echo 'Updating index...'
            cd /var/www/vostoklinux.org/repo/current
            sudo xbps-rindex -a *.xbps
            sudo xbps-rindex -c

            echo 'Fixing permissions...'
            sudo chown -R www-data:www-data /var/www/vostoklinux.org/repo/
            
            echo 'Done!'
          "
        fi
        
    - name: Test Repository After Deploy
      if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      run: |
        echo "=== Testing repository after deploy ==="
        sleep 3
        # Тестируем доступность репозитория
        curl -s -I https://repo.vostoklinux.org | head -1
        
    - name: Upload Build Artifacts
      if: success() && github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4 # ОБНОВЛЕНО ДО V4
      with:
        name: ${{ matrix.package }}-binpkgs
        path: /tmp/artifacts/*.xbps
        retention-days: 7
        
    - name: Summary
      if: always()
      run: |
        echo "=== Build Summary ==="
        echo "Package: ${{ matrix.package }}"
        echo "Build status: ${{ job.status }}"
        echo "Repository: https://repo.vostoklinux.org"
        echo "Main website: https://vostoklinux.org"
        echo "Timestamp: $(date)"

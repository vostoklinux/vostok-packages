name: Build and Deploy Vostok Packages

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'srcpkgs/**'
      - '.github/workflows/build-packages.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - vostok-mirrorlist
          - vostok-release
          - vostok-wallpapers
          - vostok-calamares-config
          - vostok-grub-theme
    
    steps:
    - name: Checkout Vostok Packages
      uses: actions/checkout@v3
      with:
        fetch-depth: 1
        
    - name: Setup Void Build Environment
      run: |
        echo "Setting up Void Linux build environment..."
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          bash \
          curl \
          git \
          perl \
          tar \
          xz-utils \
          zstd \
          zip \
          python3 \
          gcc
        
        # Clone Void packages repository
        git clone --depth=1 https://github.com/void-linux/void-packages.git
        cd void-packages
        
        # Initialize xbps-src
        echo "XBPS_CHROOT_CMD=etch" >> etc/conf
        echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> etc/conf
        ./xbps-src binary-bootstrap
        
        echo "Build environment ready!"
        
    - name: Build Package ${{ matrix.package }}
      run: |
        cd void-packages
        
        # Copy our package
        if [ -d "../srcpkgs/${{ matrix.package }}" ]; then
          cp -r "../srcpkgs/${{ matrix.package }}" "srcpkgs/"
          echo "Building ${{ matrix.package }}..."
          
          # Try to build package
          if ./xbps-src pkg "${{ matrix.package }}"; then
            echo "✅ Package ${{ matrix.package }} built successfully!"
            
            # List created packages
            echo "Created packages:"
            find hostdir/binpkgs -name "*${{ matrix.package }}*.xbps" 2>/dev/null || echo "No packages found"
          else
            echo "❌ Failed to build ${{ matrix.package }}"
            exit 1
          fi
        else
          echo "⚠️ Package ${{ matrix.package }} not found in srcpkgs/"
        fi
        
    - name: Upload Artifacts
      if: success() && github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.package }}-binpkgs
        path: void-packages/hostdir/binpkgs/*${{ matrix.package }}*.xbps
        retention-days: 7
        
    - name: Deploy to VPS
      if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      env:
        VPS_HOST: ${{ secrets.VPS_HOST }}
        VPS_USER: ${{ secrets.VPS_USER }}
        VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      run: |
        echo "Deploying packages to VPS..."
        
        # Setup SSH
        mkdir -p ~/.ssh
        echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        
        # Create SSH config without heredoc
        echo "Host vostok-vps" > ~/.ssh/config
        echo "  HostName $VPS_HOST" >> ~/.ssh/config
        echo "  User $VPS_USER" >> ~/.ssh/config
        echo "  IdentityFile ~/.ssh/id_ed25519" >> ~/.ssh/config
        echo "  StrictHostKeyChecking no" >> ~/.ssh/config
        echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config
        
        # Add host to known_hosts
        ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null
        
        # Test SSH connection
        echo "Testing SSH connection..."
        ssh -o ConnectTimeout=10 vostok-vps "echo 'SSH connection test successful'" || {
          echo "SSH connection failed"
          exit 1
        }
        
        # Find and copy packages
        echo "Looking for packages to deploy..."
        for pkg in void-packages/hostdir/binpkgs/*${{ matrix.package }}*.xbps; do
          if [ -f "$pkg" ]; then
            echo "Uploading $pkg..."
            scp "$pkg" vostok-vps:/var/www/vostoklinux.org/repo/current/
          else
            echo "No package files found for ${{ matrix.package }}"
          fi
        done
        
        # Update repository on VPS
        echo "Updating repository index on VPS..."
        ssh vostok-vps 'set -e
          
          echo "Backing up old packages..."
          sudo mkdir -p /var/www/vostoklinux.org/repo/backup
          sudo cp /var/www/vostoklinux.org/repo/current/*'"${{ matrix.package }}"'*.xbps /var/www/vostoklinux.org/repo/backup/ 2>/dev/null || true
          
          echo "Updating repository index..."
          sudo /usr/local/bin/update-repo
          
          echo "Fixing permissions..."
          sudo chown -R www-data:www-data /var/www/vostoklinux.org/repo/
          sudo chmod -R 755 /var/www/vostoklinux.org/repo/
          
          echo "Repository status:"
          ls -la /var/www/vostoklinux.org/repo/current/*'"${{ matrix.package }}"'*.xbps 2>/dev/null || echo "No packages found"
          
          echo "Done!"'
        
        echo "✅ Packages deployed to VPS!"
        
    - name: Test Repository Access
      if: success() && github.event_name != 'pull_request'
      run: |
        echo "Testing repository access..."
        curl -s -I https://repo.vostoklinux.org | head -5
        echo ""
        echo "Available packages:"
        curl -s https://repo.vostoklinux.org | grep -o 'href="[^"]*\.xbps"' | sed 's/href="//' | sed 's/"//' || echo "Could not list packages"
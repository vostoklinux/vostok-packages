name: Build and Deploy Vostok Packages

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'srcpkgs/**'
      - '.github/workflows/build-deploy.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Ручной запуск
  schedule:
    - cron: '0 2 * * 0'  # Еженедельно в воскресенье в 2 часа ночи

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: voidlinux/voidlinux:latest
      options: --user root --privileged
    
    strategy:
      matrix:
        package:
          - vostok-mirrorlist
          - vostok-release
          - vostok-wallpapers
          - vostok-calamares-config
          - vostok-grub-theme
    
    steps:
    - name: Checkout Vostok Packages Repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 1
        
    - name: Setup Void Linux Build Environment
      run: |
        echo "=== Setting up Void Linux build environment ==="
        
        # Обновляем систему и устанавливаем зависимости
        echo "Updating system and installing dependencies..."
        xbps-install -Syu
        xbps-install -y \
          base-devel \
          curl \
          git \
          xtools \
          bubblewrap \
          libarchive-tools \
          python3 \
          openssl
        
        echo "✅ Build environment ready!"
        
    - name: Clone Void Packages Repository
      run: |
        echo "=== Cloning void-packages ==="
        
        # Клонируем void-packages
        git clone --depth=1 https://github.com/void-linux/void-packages.git
        
        # Переходим в директорию
        cd void-packages
        
        # Настраиваем конфигурацию
        echo "Configuring xbps-src..."
        echo "XBPS_CHROOT_CMD=bubblewrap" > etc/conf
        echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> etc/conf
        
        # Запускаем начальную настройку
        echo "Running binary-bootstrap..."
        ./xbps-src binary-bootstrap
        
        echo "✅ Void packages repository ready!"
        
    - name: Build Package ${{ matrix.package }}
      run: |
        echo "=== Building package: ${{ matrix.package }} ==="
        
        # Создаем директорию для артефактов
        mkdir -p /tmp/artifacts
        
        # Проверяем, существует ли наш пакет
        if [ ! -d "srcpkgs/${{ matrix.package }}" ]; then
          echo "❌ Package ${{ matrix.package }} not found!"
          exit 1
        fi
        
        echo "Copying package to void-packages..."
        
        # Копируем наш пакет в void-packages
        cp -r "srcpkgs/${{ matrix.package }}" "void-packages/srcpkgs/"
        
        # Переходим в void-packages
        cd void-packages
        
        echo "Building ${{ matrix.package }}..."
        
        # Собираем пакет
        if ./xbps-src pkg "${{ matrix.package }}"; then
          echo "✅ Package ${{ matrix.package }} built successfully!"
          
          # Копируем собранные пакеты
          echo "Copying artifacts..."
          find hostdir/binpkgs -name "*${{ matrix.package }}*.xbps" 2>/dev/null | while read pkg; do
            echo "  - $(basename "$pkg")"
            cp "$pkg" /tmp/artifacts/
          done
          
          # Если ничего не нашли, проверяем другие места
          if [ ! -f "/tmp/artifacts/*.xbps" ] 2>/dev/null; then
            echo "Checking other locations..."
            find . -name "*${{ matrix.package }}*.xbps" -exec cp {} /tmp/artifacts/ \; 2>/dev/null || true
          fi
        else
          echo "❌ Failed to build ${{ matrix.package }}"
          exit 1
        fi
        
        # Показываем, что получилось
        echo "Artifacts created:"
        ls -la /tmp/artifacts/ 2>/dev/null || echo "No artifacts found"
        
    - name: Verify and Deploy to VPS
      if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      env:
        VPS_HOST: ${{ secrets.VPS_HOST }}
        VPS_USER: ${{ secrets.VPS_USER }}
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        echo "=== Verifying and Deploying to VPS ==="
        
        # Проверяем, есть ли артефакты
        if [ ! -d "/tmp/artifacts" ] || [ -z "$(ls -A /tmp/artifacts/*.xbps 2>/dev/null)" ]; then
          echo "⚠️ No packages to deploy"
          exit 0
        fi
        
        echo "Found packages to deploy:"
        ls -la /tmp/artifacts/*.xbps
        
        # Setup SSH
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        
        # Сохраняем приватный ключ (исправленный синтаксис)
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        
        # Добавляем хост в known_hosts
        ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        
        # Загружаем пакеты на VPS
        echo "Uploading packages to VPS..."
        scp -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            /tmp/artifacts/*.xbps \
            "$VPS_USER@$VPS_HOST:/tmp/"
        
        # Выполняем команды на VPS
        echo "Updating repository on VPS..."
        ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            "$VPS_USER@$VPS_HOST" "
            set -e
            
            echo '=== Moving packages ==='
            sudo mkdir -p /var/www/vostoklinux.org/repo/current
            sudo mv -f /tmp/*.xbps /var/www/vostoklinux.org/repo/current/ 2>/dev/null || echo 'No packages to move'
            
            echo '=== Updating repository index ==='
            if command -v xbps-rindex >/dev/null 2>&1; then
              cd /var/www/vostoklinux.org/repo/current
              sudo xbps-rindex -a *.xbps 2>/dev/null || echo 'No packages to index'
              sudo xbps-rindex -c 2>/dev/null || true
              echo '✅ Repository index updated'
            else
              echo '⚠️ xbps-rindex not available'
            fi
            
            echo '=== Setting permissions ==='
            sudo chown -R www-data:www-data /var/www/vostoklinux.org/repo/ || true
            sudo chmod -R 755 /var/www/vostoklinux.org/repo/ || true
            
            echo '=== Final status ==='
            echo 'Repository location: /var/www/vostoklinux.org/repo/current/'
            echo 'Number of packages: \$(ls -la /var/www/vostoklinux.org/repo/current/*.xbps 2>/dev/null | wc -l || echo 0)'
        "
        
        echo "✅ Deployment completed!"
        
    - name: Upload Build Artifacts
      if: success() && github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.package }}-binpkgs
        path: /tmp/artifacts/*.xbps
        retention-days: 7
        
    - name: Summary
      if: always()
      run: |
        echo "=== Build Summary ==="
        echo "Package: ${{ matrix.package }}"
        echo "Status: ${{ job.status }}"
        echo "Repository: https://repo.vostoklinux.org/current/"
        echo "Website: https://vostoklinux.org"
        echo "Time: $(date '+%Y-%m-%d %H:%M:%S')"